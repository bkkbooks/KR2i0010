body:
  text: 江南别録載記𩔖提要臣等謹案江南别録一卷宋陳彭年撰彭年字永年撫州南城人太平興國中進士官至兵部侍郎參知政事諡曰文事蹟具宋史本𫝊此書所記為南唐義祖烈祖元宗後主四代事實時湯悦徐鉉等奉詔撰江南録彭年是編盖私相纂述以補所未備故以别録為名宋史藝文志晁公武讀書志俱作四卷當以一代為一卷此本一卷疑後人所合併也其書頗好語怪如徐知誨妻吕氏為祟陳仁杲神助戰趙希操聞鬼語諸條皆體近稗官又元宗初名景通即位後改名璟既稱臣于周避周諱又改名景而此書乃謂初名景與史不合又烈祖遷吳讓皇于潤州一年而殂又一年始遷其族于泰州而此書併叙于烈祖受禪之初端緒亦未分明然其他可取者多葢彭年年十三即著皇綱論萬餘言為江左名輩所賞李後主嘗召入宫中令與其子仲宣逰處故于李氏有國時事見聞最詳又冊府元龜亦彭年所預輯其僭偽部中李昪一條稱昪自云永王璘之裔未免附會此書但言唐之宗室亦深得傳疑之義以資治通鑑相㕘校其為司馬光所採用者甚夥固異乎傳聞影響之説也乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書江南别録宋陳彭年撰義祖徐氏諱温烈祖之養父也剛毅寡言罕與人交衆中凛然可畏目為徐嗔吳武王時淮南勁兵數萬號黒雲長劒義祖為其禆將累以功遷右職與張顥同為衙内列校吳武王疾亟召左右謀後事判官周隱曰王之子未必能控禦諸將劉威長者必不負人可授以軍政使待諸子長也吳武王不答顥與義祖曰王親犯矢石而創基業安可使外人為王儻楊氏無兒有女亦可况未至此吳武王曰爾能如是吾死且瞑目矣武王卒子渥嗣立是為景王景王所為不道居父喪中掘地為室以作音樂夜然燭擊毬燭大者十圍一燭之費數萬或單馬出遊從者不知所詣奔走道路義祖與顥承閒泣諫景王怒曰爾謂我不中何不殺我自為顥對曰某曽受先王恩安敢興此心又景王親吏皆恃勢凌顥等顥不平遂有為亂之意景王晨興視事顥擁百餘人持長刀直進景王驚曰爾等果殺我邪顥曰非敢殺王殺王之左右不忠良者殺數十人而止諸將非其黨者相次被誅月餘殺景王聲言暴卒立其母弟隆演是為宣王初顥與義祖約弑渥而以其地臣於梁至是顥欲背約自立嚴可求沮之乃止顥既得志又欲害義祖義祖用嚴可求鍾泰章謀誅顥自為淮南行軍司馬專軍政時藩郡守将皆武王勲舊謂為所制心不能服宣州李遇謂人曰吾始不記有此人今日何忽乃爾遇不自安遂反及敗良賤百口皆死自是諸將屏氣矣李徳誠為潤州秉燭夜出揚州遥見謂有變立命親兵千餘人渡江比明徳誠盥漱兵已入城除徳誠為江州徳誠惶怖即路帷幙皆不及取至江州懼禍未已令子繼勲來謁義祖見之歎曰有子如此非為惡人也以女妻繼勲移徳誠於信州後數嵗義祖岀鎮建康以親子知訓代知淮南軍政知訓驕暴不奉法與宣王泛舟濁河酒酣宣王先起隨以彈丸擊之李徳誠有女樂數十人遣使求之徳誠報曰此等皆有所生又且年長不足以接貴人俟求少妙者進之知訓對徳誠使者曰吾殺徳誠并其妻取之亦易耳初學兵於朱瑾瑾悉心教之後與瑾有隙夜遣壯士殺瑾瑾手刃數人埋於舍後瑾出鎮泗州往辭知訓知訓約至瑾家為别及至瑾令妻出見知訓方拜瑾以笏擊踣斬其首入謁宣王曰為國去賊為民去害在今日矣時强兵皆在建鄴宣王恐事不濟以衣障面曰此事阿舅自為勿累於我退走入内宣王出於朱氏故舅呼瑾瑾怒曰妾子不足與語誤我大事遂自殺烈祖自京口入代知訓掌政自是中外寜謐時楊氏猶以東南道都統吳王承制行事義祖權柄雖重而名數猶卑遂請建國改號自為都統封齊王未幾隆演卒弟溥立是為讓皇三年莊宗克梁遣使來告義祖曰沙陀自稱中興來者必詔命逆告之曰若敵國之書乃可餘則不奉命時果齎詔來使者盤桓果具驛書上聞莊宗初平大敵意務懐柔遂用敵國之禮書曰唐皇帝謹命書與吳國主吳遣司農卿盧蘋北聘李徳誠自信州來朝賜宴至夕而罷是夜宣王殂宫中以徳誠進毒幽於殿内徳誠親吏走告義祖以朝使不至慮有他變引親吏百餘人夜渡江斬關而入明日釋徳誠立讓皇溥宣王之弟也義祖雖總大兵而身在外朝政皆遥禀烈祖居中任事徐玠數勸義祖除烈祖以次子知詢代之義祖亦知烈祖終為己害而烈祖勤於侍養又自幼畜之故不忍陳夫人於烈祖鍾愛尤切常曰我家貧賤時養此兒今日富貴負之非人理也知訓又死知詢尚少因以大政委焉及聞玠之謀深以為不宜烈祖亦不自安求為江西義祖令知詢入覲明日詔下以知詢為相其夕宋齊丘與術士劉通微同宿聞鼔聲通微曰事必中變且有大喪書至而義祖殂義祖晩有氣疾嵗中數發發則困躓將殂之夕氣暴作醫者進藥無効而絶知詢自淮南奔喪翌日起為副都統威權同義祖而知詢暗懦待諸弟不厚徐玠知其終敗輸誠於烈祖知詢内為諸弟所搆外為徐玠所賣而不知也意以已控强兵居重地烈祖雖管大政而無兵士制之甚易義祖喪將終遣使請烈祖至金陵烈祖上十餘表而讓皇不允頃之知詢入朝烈祖疏其罪以讓皇之命黜為左統軍盡奪其兵知詢面數烈祖曰先王之喪兄為人子而不親臨喪反罪我邪烈祖曰聞爾懸劒待我我亦不憚獨迫於君命不得往耳爾為人臣而畜乘輿物非反而何知誨者知詢之弟娶吳功臣吕師造之女非正嫡所出知誨常切齒因醉刺殺後頻見吕氏為祟請僧誦經亦見之僧為陳因果吕曰吾不觧此志在報寃知詢之敗知誨有力焉烈祖徳之以為江西至鎮嵗餘不見吕氏心中甚喜有家人自淮南歸於江心遇綵舟有婦人乃吕氏也招家人曰為我謝相公善自愛我今他適矣又以綉履授之曰恐相公不信謂爾詐此殯時物用以為信家人至江西以履進知誨熟視之未畢吕氏已在側曰爾謂我的不來也少時知誨卒知詢代之遇其喪於中途撫棺而哭曰弟用心如此吾亦不怨但何以見先王於地下聞者傷之烈祖受吳禪追上義祖尊號徐氏諸子封拜與李氏同而知誨之後特盛子景遼景遊皆出入宫禁預樞宻專掌浮圖修造之任當時言蠧政者以二人為首烈祖諱昇唐之宗室也舊名知誥少孤為義祖所養有相者謂義祖曰君相至貴且有貴子然非君家所生又夢為人引臨大水中黄龍數十令義祖捉之義祖獲一龍而寤明且乃得烈祖烈祖奉義祖以孝聞嘗從義祖征伐有不如意杖而逐之及歸拜迎門外義祖驚曰爾在此邪烈祖泣曰為人子者舍父母何適父怒而歸母子之常也義祖由是益憐惜長善書計性嚴明不可以非理犯累為樓船指揮使宋齊丘者父為江西鍾傅副使父卒羈旅淮南欲上書干謁而無紙墨行歎道中有娼婦遇之問曰少年子何不樂如此齊丘以情告召歸置食贈錢數千因曰郎時至此不遣郎有所闕也齊丘感之及貴納為正室騎將姚洞天薦於烈祖烈祖竒其才與為布衣交動静皆與之謀後烈祖除昇州刺史辟齊丘為判官義祖出鎮建鄴改烈祖為潤州烈祖意求宣州聞命不樂宋齊丘曰今三郎政亂敗在朝夕京口去淮南隔一水若有變必先知之是天贊也三郎知訓也未幾果有朱瑾之事烈祖輕舟渡江鎮定内外以待義祖之至義祖以已子既弗克負荷用烈祖猶愈於他人因留輔政先是知訓待烈祖甚悖每呼為乞子與諸弟夜飲遣召烈祖烈祖不至知訓怒曰不喫酒喫劒乎餘皆𩔖此及敗知訓宅中有土室封閉甚固烈祖請義祖開視其中絹圖義祖之形而身荷五木烈祖及諸弟執縛如就刑之狀已被衮冕南面視朝義祖唾曰狗死遲矣烈祖因疏其罪惡事怒遂少觧死者猶數家烈祖得政以愛民節用為本甚得當時之譽吳宣王即尊位烈祖當相而勲舊有未登三事者烈祖不欲自尊大乃以左僕射參政事時諸國交兵江淮為強盛烈祖増修法度人獲乂安識者歸心焉義祖殂知詢以罪廢大政由已矣數嵗出鎮建鄴封齊王制度如義祖以長子景通居中輔政宋齊丘王謨皆為相孫晟自中原來奔與語大竒之引居門下徐知詢卒李建勲來歸幙府遂與大將周宗等進禪代之議受禪之日白雀見于庭江西楊化為李信州李生連理詔還李姓國號唐立髙祖已下七廟尊吳主為讓皇信州李徳誠廬州周本皆楊氏舊老上言吳王已遜位宜依晉魏故事䧏封王公出居别邸烈祖曰曹馬之事非朕志也固請不已乃徙讓皇於丹徒遷諸楊於泰州初吳武王諱行宻謂杏為甜梅及是復呼為杏故老有泣下者烈祖日於勤政殿視政有言事者雖徒隸必引見善揣物情人不能隱千里之外如在目前詔立齊王景為皇太子王表願寢此禮三表許之以大元帥總百揆信王景遷先娶徳誠之女中興後有司以同宗姓請離之制曰南平王國之元老婚不可離信王妃可以南平為氏南平徳誠所封也景遷母种氏晚嵗尤承恩寵宋后罕得接見烈祖幸齊王宫遇其親理樂器大怒切責數日种氏承間言景遷之才可代為嗣烈祖作色曰國家大計女子何預立嫁之烈祖殂宋后欲甘心數四賴元宗保全之烈祖服大丹藥發而殂大漸嚙元宗指見血曰北方有事不可忽也中書待郎孫晟草遺詔以宋后監國翰林學士李夷鄴曰此非先旨必姦人所為大行常云婦人預政亂之本也安肯自作禍階且嗣君明徳聞於天下汝曹何遽為亡國之計若遂宣行吾對百寮裂之必矣遂寢元宗即位謂夷鄴曰疾風勁草卿之謂也元宗諱璟烈祖長子也初名景幼為義祖所器常曰諸孫中此子特貴䖍州刺史鍾章恃功放恣烈祖欲繩其罪義祖曰昔無章吾已死於顥手汝曹安所託乎今日富貴章之力也背之豈人理乃令以章女配元宗義祖初見歎曰非此兒不敵此女即光穆皇后也元宗起家尚書郎吳讓皇稱之曰朕諸子皆不及也烈祖出鎮建鄴以元宗居中輔政甚得時譽烈祖即位為大元師總百揆烈祖殂遜于諸弟詞㫖堅固中書令徐玠以衮冕衣之曰大行陛下以神器之重畀陛下陛下固守小節非所以尊先㫖承孝道也乃嗣位改元保大太常博士韓熙載上疏曰踰年改元古之制也事不師古何以訓人時制書已行遂不改詔立皇弟景遂為皇太弟馮延己自元帥掌書記為翰林學士承㫖延魯自水部員外郎為中書舍人延魯急於趨進欲以功名圖重位乃興建州之役延己曰士以文行飾身忠信事上何用行險以要禄延魯曰兄自能如此弟不能愔愔待循資宰相也始王氏政亂閩人聞我師之至皆伐木開道壺漿奉迎既下建州軍無節制大掠數日民不堪其苦思効順者觧體矣陳覺為招討使矯制進圍福州表言朝夕可剋元宗以為實令王崇文為統帥馮延魯亦往諸將爭功自相違貳崇文不能制會錢唐以兵數千來救我師不戰而潰詔鎖覺及延魯赴建鄴既至尋赦其罪始馬殷據湖南并桂管之地馬希範卒弟希廣立庶兄希萼自永州赴萼判官李恒臯知欲為變未至以為朗州節度嵗餘舉兵殺希廣代其位少弟希崇又廢希萼自立幽希萼送衡州將殺之大姓廖偃與叔匡凝以部曲數百人刼希萼於道奉為衡山王以伐希崇數日有衆萬人希崇遣使求救於我元宗命袁州刺史邊鎬督兵赴援其實襲之也時長沙童謡曰鞭打馬馬須走兵至希崇希萼皆降餘郡相次歸附乘亂取廣南桂管之地朗州劉言亦自為刺史命將軍李建期屯益陽以圖朗州將軍張巒屯零陵以圖桂州鎬以偏兵不百日而下一國四方聞之以為神鎬性輕信自朗州至者皆陳言之忠順鎬不為備嵗餘朗州土豪王逵襲殺建期進逼長沙奉言為主言不能制鎬棄城遁歸諸郡皆沒唯巒全軍而廻周師南伐進逼夀州劉彦貞督兵北征戰敗於正陽死於陣淮上方用兵錢唐乘虛圍我常州命將軍柴克宏往救常州有隋將陳仁杲祠克宏將戰夜夢仁杲曰吾遣隂兵助爾及戰有黒牛二頭衝錢唐之陣我師繼之乃大破之斬首萬餘遂觧常州之圍以克宏為江州節度使册仁杲帝號諡武烈右僕射孫晟使周給事中王崇質為介晟至汴京謂崇質曰吾觀事勢不生還矣君家百口當别為謀乃白世宗遣崇質歸計事㑹鍾謨李徳明亦至世宗又遣徳明至建鄴盛陳世宗威徳請割地求和宋齊丘深惡徳明使崇質異其言乃以賣國誅徳明世宗召晟責之因曰諸將圍夀州乆未剋汝能䧏之朕赦汝罪晟至城下見劉仁瞻遥呼曰君受國家旌旄臣節不可隳也且援兵至世宗大怒追至汴京斬之晟臨刑神色不變南望再拜曰死不負陛下矣既而泗州䧏北諸軍繼敗乃遣陳覺奉表割江北之地求成世宗許之遂去尊號稱國主用周正朔大弟景遂固請歸藩立長子冀為太子時丹徒得古銘曰天子冀州人衆以冀應之未幾冀卒識者謂冀州趙地也陳覺乘閒言社稷禍在朝暮請陛下宴居宫中國政盡付宋齊丘以紓喪亂元宗以戎事未寜隱忍不發鍾謨自汴京歸理徳明之怨乃言人臣窺國理不可容遂誅覺幽齊丘於青陽尋亦卒諡醜繆謨使回為禮部侍郎任用權傾中外與信州刺史張巒有舊巒入為天徳軍使每詣謨第常屏人獨語中夜乃止給事中唐鎬宻言恐有他變宜先圖之㑹太子冀葬謨固請敕巒以所部兵馬為京城廵徼元宗乃下詔數謨侵官之罪貶於饒州縊死巒亦黜為宣州副使元宗殂於南都南都豫章也太子即位於建鄴梓宫至日南都羣臣表請殯於别宫後主下詔不許哭甚哀切乃殯於萬夀殿元宗神彩精粹辭旨清暢湖南使至歸與親友言曰爾識東朝官家南嶽真君不如也後主諱煜字重光元宗弟五子也幼而好古為文有漢魏風母兄冀為太子性嚴忌後主獨以典籍自娛未嘗干預時政冀卒立為太子元宗幸南都後主監國於建鄴臨事明允甚得時譽元宗崩哀毁過禮即位立妃周氏為后句容尉張佖上書言為理之要詞甚激切後主手詔慰諭徵為監察御史周后疾後主朝夕臨視藥非親嘗不進衣不解帶者逾月及殂哀毁骨立杖然後起立后妹為后王者婚禮歴代少有詔中書舍人徐鉉知制誥潘佑與禮官參議互有矛楯議乆不决後令文安郡公徐遊評其是非時佑方寵用遊希㫖奏佑為長月餘遊病疽鉉戲謂人曰周孔亦能為祟乎佑既居親宻欲盡去舊人獨當國政後主亦惡之俄以本官專如國史佑彌不樂乃非詆公卿與戸部侍郎李平親狎上表言左右皆姦邪不誅為亂在即後主手書敦諭七表不止因請休官逺去李平初與朱元自北來元已叛去平深厚難測後主慮其同搆大姦乃暴其罪而誅之後謂左右曰吾誅佑平思之踰月不决蓋不獲已也烈祖初立庶事草創未有貢舉至元宗始議興置時韓熙載徐鉉兄弟為當代文宗繼以潘佑張洎以才名顯後主尤好儒學故江左三十年文物有貞元元和之風元宗稱臣於周惟去尊號用周正朔其諸制度猶未全改後主即位始衣紫袍王師屯漢陽鄂州楊守中以聞人心大恟乃下制貶損臺省名號並皆改易王皆降封公遣長弟從善入貢因留質後主天性友愛自從善不還嵗時宴㑹皆罷惟作登高賦以見意曰原有鴒兮相從飛嗟我季兮不來歸天朝使中書舍人盧多遜來聘南伐之謀兆於此矣後主微知之遣使願受封策太祖不許甲戌嵗夏梁迥來聘從容謂後主曰今冬有柴燎之禮國主當來助祭後主唯唯不答秋初中書舍人李穆齎詔來曰朕以仲冬有事於圜丘思與卿同閲犧牲後主辭以疾時大兵已在荆湖惟候穆之反命後主既不赴召遂决進取九月舟師自大江直趨池州中外奪氣樊若水父保大末為漢陽縣令父卒家池州累舉進士不第至汴京上書太祖謂之有才術累遷資善大夫平南之策多所參預時雖得池州及姑熟餘郡皆未奉命糧道艱阻若水請於采石繫橋以利輸輓每嵗大江春夏暴漲謂之黄花水及天兵至水皆退小識者知天命焉錢唐悉兵來圍常州主將禹萬誠固守大將金成禮刼萬誠以降而天兵已屯於建鄴城南十餘里錢唐又進圍潤州兵初興議者以京口要害當得良將侍衛廂虞候劉澄舊事藩邸後主尤親任之乃擢為潤州留後臨行謂曰卿本未合離孤孤亦難與卿别但此非卿不可勉副孤心澄泣涕奉别歸家盡輦金玉以往謂人曰此皆前後所賜今國家有難當散此以圖勲業後主聞之益喜及錢唐兵初至營搆未成左右請岀兵掩之時澄已懷向背堅曰兵岀勝則可不勝則立為虜矣救至然後圖戰後主又命盧絳為援綘至錢唐兵少退綘方入城圍又合矣固守累月自相猜忌初絳怒一禆將將議殺之未决澄私謂曰盧公怒爾爾不生矣禆將泣涕請命澄因曰吾有一言告爾非徒免死且富貴因諭以降事令先岀導意裨將曰奈緣某家在都城何澄曰事急矣當且為身謀我家百口亦不暇顧矣是夜禆將赴城而岀明日澄徧召將卒告曰澄守數旬志不負國事勢如此須為生計諸君以為何如將卒皆發聲大哭澄懼有變亦泣曰澄受恩固深於諸君且有父母在都城寜不知忠孝乎但力不能抗耳於是率將吏開門請降建鄴初圍後主遣使徵上江兵入援以建昌軍制置使朱贇為統將時勝兵數萬屯於湖口不進後主累促之至皖口方交戰船為天兵所圍贇自救之被執餘兵皆潰建鄴受圍經嵗城中斗米十千死者相籍惟恃此救自潤州䧏後不聞外信岀䧏者相繼或云贇已敗死後主猶謂不實城陷後主欲自殺左右泣涕固諫得止元宗後主皆妙於筆札好求古迹宫中圖籍萬卷鍾王墨跡尤多城將陷謂所幸寳儀黄氏曰此皆吾寶惜城若不守爾可焚之無使散逸及城陷黄氏皆焚時乙亥嵗十一月也後主至汴京二嵗殂南人聞之巷哭設齋後主初即位中使趙希操自建鄴奉使江西夜宿姑熟中宵忽聞二人相語曰君自金陵來新王何以為理一曰吾聞新王以仁孝為理又曰如是則明王也乆之又聞一人曰然則水木之嵗當至汴梁希操心喜以後主終得中原果以乙亥嵗國除入天朝後主妙於音律樂曲有念家山親演其聲為念家山破識者知其不祥至甲戌嵗有衛兵秦福自毁其鞋跣足升正殿御座論者以鞋者履也履與李同言李氏將敗此殿為秦人所得也秦趙古同姓焉後主酷好著述雜説百篇行於代時人以為可繼典論江南大臣至中朝名最顯著者徐鉉字鼎臣與弟鍇同有大名於江左方之士衡士龍焉鍇字楚金先城陷而卒著書甚多諡為文後主文集鍇為之序新説又鉉為序鉉著質論十餘篇後主宸筆冠篇儒者榮之江南别録
